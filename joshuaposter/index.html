<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(135deg, #ff7e5f, #feb47b, #ff6ec4, #7873f5);
    }

    .card {
        width: 90%;
        max-width: 700px;
        padding: 50px 30px;
        text-align: center;

        border-radius: 25px;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);

        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.3);
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 15px;
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    .quote {
        font-size: 1.3rem;
        color: #fff;
        margin-bottom: 15px;
        opacity: 0.9;
    }

    .author {
        font-size: 1.1rem;
        color: #ffeaa7;
        font-weight: bold;
        letter-spacing: 2px;
    }
</style>

</head>

<body>

<div class="card">
    <h1>Daily Inspiration</h1>

    <p class="quote">
        Good things take time. Keep moving.
    </p>

    <p class="author">
        - Inoc Joshua Carl A.
    </p>
</div>

</body>
</html>
